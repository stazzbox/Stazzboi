<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stazz App Launcher</title>
    <style>
        :root {
            --neon-yellow: #f39c12;
            --neon-pink: #ff6b6b;
            --neon-red: #e74c3c;
            --neon-blue: #3498db;
            --bg-dark: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* 9:16 Neon Frame Container */
        .phone-container {
            width: 360px;
            height: 640px;
            background-color: var(--bg-dark);
            border-radius: 30px;
            position: relative;
            box-shadow: 0 0 20px var(--neon-yellow), inset 0 0 10px var(--neon-yellow);
            border: 4px solid var(--neon-yellow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Periodic Flash Animation Trigger */
        @keyframes neon-flash {
            0%, 90%, 94%, 98%, 100% { opacity: 1; filter: drop-shadow(0 0 10px var(--neon-yellow)); }
            92%, 96% { opacity: 0.3; filter: none; }
        }

        .flash-active {
            animation: neon-flash 2s ease-in-out;
        }

        /* Horizontal Swipe Wrapper */
        .swiper-viewport {
            flex: 1;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
        }

        /* Hide Scrollbars */
        .swiper-viewport::-webkit-scrollbar {
            display: none;
        }

        /* Pages */
        .page {
            min-width: 100%;
            height: 100%;
            scroll-snap-align: start;
            box-sizing: border-box;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        /* Hide page scrollbars */
        .page::-webkit-scrollbar {
            display: none;
        }

        h2 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 25px;
        }

        /* Grid for Grid Apps */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
        }

        /* App Box Styling */
        .app-box {
            aspect-ratio: 1;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            transition: transform 0.2s;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-sizing: border-box;
        }

        .app-box:active, .menu-item:active {
            transform: scale(0.95);
        }

        /* App Specific Borders/Glows */
        .yellow-app { border: 2px solid var(--neon-yellow); box-shadow: inset 0 0 10px rgba(243, 156, 18, 0.3); }
        .pink-app { border: 2px solid var(--neon-pink); box-shadow: inset 0 0 10px rgba(255, 107, 107, 0.3); }
        .red-app { border: 2px solid var(--neon-red); box-shadow: inset 0 0 10px rgba(231, 76, 60, 0.3); }
        .blue-app { border: 2px solid var(--neon-blue); box-shadow: inset 0 0 10px rgba(52, 152, 219, 0.3); }

        /* Menu List Styles for Page 4 */
        .sub-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .menu-item {
            background: #2a2a2a;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid #444;
            font-size: 0.9rem;
            transition: transform 0.2s;
        }

        /* Page Dots Indicator */
        .page-dots {
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.2);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: background 0.3s;
        }

        .dot.active {
            background: white;
        }
        
        /* Direct link style for the QR box zone */
        .qr-zone {
            width: 160px;
            height: 160px;
            border: 2px dashed #666;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            text-decoration: none;
            border-radius: 12px;
            transition: border-color 0.2s;
        }
        .qr-zone:hover {
            border-color: var(--neon-yellow);
        }
    </style>
</head>
<body>

    <div class="phone-container" id="phoneFrame">
        <div class="swiper-viewport" id="viewport">
            
            <div class="page" id="page-home">
                <h2>Home</h2>
                <div class="app-grid">
                    <a href="/stazzboi" class="app-box yellow-app">Stazzboi</a>
                    <a href="/stazzlies" class="app-box pink-app">The Stazzlies</a>
                    <a href="/Stazzeria" class="app-box red-app">Stazzeria</a>
                    <a href="/stazzology" class="app-box blue-app">Stazzology</a>
                    <a href="/stazzex" class="app-box yellow-app">The Stazzex</a>
                </div>
            </div>

            <div class="page" id="page-qr">
                <h2>QR</h2>
                <a href="/QR" class="qr-zone">
                    <div>Tap for QR Link</div>
                </a>
            </div>

            <div class="page" id="page-photos">
                <h2><a href="/photos" style="color: white; text-decoration: none;">Photos</a></h2>
                <div class="app-grid">
                    <a href="/stazzboi" class="app-box yellow-app">Stazzboi</a>
                    <a href="/stazzlies" class="app-box pink-app">Stazzlies</a>
                    <a href="/Stazzeria" class="app-box red-app">Stazzeria</a>
                </div>
            </div>

            <div class="page" id="page-the-stazzex">
                <h2>The Stazzex</h2>
                <div class="sub-menu">
                    <a href="/stazzism" class="menu-item">Stazzism</a>
                    <a href="/stazzerian" class="menu-item">Stazzerian</a>
                    <a href="/stazzboi" class="menu-item">Stazzboi</a>
                    <a href="/beachybird" class="menu-item">BeachyBird</a>
                    <a href="/mrsstazzland" class="menu-item">Mrs. Stazzland</a>
                    <a href="/khamelion" class="menu-item">The Khamelion</a>
                    <a href="/president" class="menu-item">Stazzerian President</a>
                    <a href="/council" class="menu-item">Stazzerian Council</a>
                </div>
            </div>

        </div>

        <div class="page-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        // Neon Flickering / Flashing Effect every 45 seconds
        const phoneFrame = document.getElementById('phoneFrame');
        
        function triggerNeonFlash() {
            phoneFrame.classList.add('flash-active');
            setTimeout(() => {
                phoneFrame.classList.remove('flash-active');
            }, 2000);
        }
        setInterval(triggerNeonFlash, 45000);

        // Track Active Dots on Swiping
        const viewport = document.getElementById('viewport');
        const dots = document.querySelectorAll('.dot');
        const pageWidth = 360; 

        viewport.addEventListener('scroll', () => {
            const scrollLeft = viewport.scrollLeft;
            const activePage = Math.round(scrollLeft / pageWidth);
            
            dots.forEach((dot, index) => {
                if (index === activePage) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
