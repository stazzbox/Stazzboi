<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAZZBOI.COM | Welcome to the Stazzation</title>
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/portal-grid.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <div class="header-container">
                <h1 class="header-title">STAZZBOI.COM</h1>
                <p class="header-tagline">Welcome to the Stazzation.</p>
            </div>
        </header>

        <main class="main-content section">
            
            <section class="hero-section" data-route="/kelvin">
                <div class="hero-image-wrapper">
                    <img src="assets/images/hero-kelvin.jpg" alt="Kelvin Stazzland" class="hero-image">
                </div>
                <div class="hero-content">
                    <h2 class="hero-title">Kelvin “Stazzboi” Stazzland</h2>
                    <p class="hero-subtitle">President of Stazzeria • Rapper • Content Creator</p>
                </div>
            </section>

            <section class="portal-grid">
                
                <a href="/president" class="portal-tile" data-route="/president">
                    <div class="portal-logo-wrapper">
                        <img src="assets/logos/president.svg" alt="President of Stazzeria Logo" class="portal-logo">
                    </div>
                    <span class="portal-label">President of Stazzeria</span>
                </a>

                <a href="/stazzboi" class="portal-tile" data-route="/stazzboi">
                    <div class="portal-logo-wrapper">
                        <img src="assets/logos/stazzboi.svg" alt="Stazzboi Logo" class="portal-logo">
                    </div>
                    <span class="portal-label">Stazzboi</span>
                </a>

                <a href="/khamelion" class="portal-tile" data-route="/khamelion">
                    <div class="portal-logo-wrapper">
                        <img src="assets/logos/khamelion.svg" alt="The Khamelion Logo" class="portal-logo">
                    </div>
                    <span class="portal-label">The Khamelion</span>
                </a>

                <a href="/stazzology" class="portal-tile" data-route="/stazzology">
                    <div class="portal-logo-wrapper">
                        <img src="assets/logos/stazzology.svg" alt="STAZZOLOGY Logo" class="portal-logo">
                    </div>
                    <span class="portal-label">STAZZOLOGY</span>
                </a>

                <a href="/stazzex" class="portal-tile" data-route="/stazzex">
                    <div class="portal-logo-wrapper">
                        <img src="assets/logos/stazzex.svg" alt="The Stazzex Logo" class="portal-logo">
                    </div>
                    <span class="portal-label">The Stazzex</span>
                </a>

                <a href="/latest" class="portal-tile" data-route="/latest">
                    <div class="portal-logo-wrapper">
                        <img src="assets/logos/latest.svg" alt="Latest Updates Logo" class="portal-logo">
                    </div>
                    <span class="portal-label">Latest</span>
                </a>

                <a href="/photos" class="portal-tile" data-route="/photos">
                    <div class="portal-logo-wrapper">
                        <img src="assets/logos/gallery.svg" alt="Gallery Logo" class="portal-logo">
                    </div>
                    <span class="portal-label">Gallery</span>
                </a>

                <a href="/comics" class="portal-tile" data-route="/comics">
                    <div class="portal-logo-wrapper">
                        <img src="assets/logos/comics.svg" alt="Stazzert Comics Logo" class="portal-logo">
                    </div>
                    <span class="portal-label">Stazzert Comics</span>
                </a>

                <a href="/portfolio" class="portal-tile" data-route="/portfolio">
                    <div class="portal-logo-wrapper">
                        <img src="assets/logos/portfolio.svg" alt="Portfolio Logo" class="portal-logo">
                    </div>
                    <span class="portal-label">Portfolio</span>
                </a>

            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
