<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stazzography | Powered by The Stazzex</title>

<meta name="description" content="Official Stazzography photo gallery powered by The Stazzex.">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

```
<div class="header-inner">

    <img src="Stazzex-Logo.jpg"
         alt="The Stazzex"
         class="logo">

    <div class="branding">
        <h1>Stazzography</h1>
        <p>Powered by The Stazzex</p>
    </div>

</div>
```

</header>

<main>

```
<section class="intro">

    <h2>Official Photo Gallery</h2>

    <p>
        Official photographs courtesy of The Stazzex.
        Images may depict STAZZBOI, Stazzerian leadership,
        associates, activities, events, and historical moments.
    </p>

</section>

<section id="gallery" class="gallery">
</section>
```

</main>

<div id="viewer" class="viewer">

```
<div class="viewer-content">

    <span id="close" class="close">&times;</span>

    <div class="viewer-header">

        <img src="Stazzex-Logo.jpg"
             alt="The Stazzex"
             class="viewer-avatar">

        <div>
            <strong>The Stazzex</strong>
            <div class="viewer-subtitle">
                Official Media Source
            </div>
        </div>

    </div>

    <img id="viewerImage"
         class="viewer-image"
         src=""
         alt="">

    <p id="viewerCaption"></p>

</div>
```

</div>

<script src="gallery.js"></script>

</body>
</html>
