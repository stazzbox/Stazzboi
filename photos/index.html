<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stazzography | Powered by The Stazzex</title>

<meta name="description" content="Official Stazzography gallery powered by The Stazzex.">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

.header{
    background:#181818;
    border-bottom:1px solid #333;
    padding:20px;
}

.header-inner{
    max-width:1200px;
    margin:auto;
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:60px;
    height:60px;
    border-radius:50%;
    object-fit:cover;
}

.branding h1{
    margin:0;
    font-size:32px;
}

.branding p{
    margin:5px 0 0;
    color:#999;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:4px;
    max-width:1200px;
    margin:auto;
    padding:4px;
}
.gallery img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;
    cursor:pointer;
    transition:.2s;
}

.gallery img:hover{
    opacity:.85;
}

.viewer{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    z-index:9999;
    overflow:auto;
}

.viewer-content{
    max-width:1200px;
    margin:30px auto;
    padding:20px;
}

.viewer-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:15px;
}

.viewer-avatar{
    width:45px;
    height:45px;
    border-radius:50%;
}

.viewer-image{
    width:100%;
    max-height:85vh;
    object-fit:contain;
}

.close{
    float:right;
    font-size:40px;
    cursor:pointer;
}

@media(max-width:768px){

    .gallery{
        grid-template-columns:repeat(2,1fr);
    }

}

</style>
</head>

<body>

<header class="header">

    <div class="header-inner">

        <img src="Stazzex-Logo.jpg"
             alt="The Stazzex"
             class="logo">

        <div class="branding">
            <h1>Stazzography</h1>
            <p>Powered by The Stazzex</p>
        </div>

    </div>

</header>

<div id="gallery" class="gallery"></div>
<div id="viewer" class="viewer">

    <div class="viewer-content">

        <span id="close" class="close">&times;</span>

        <div class="viewer-header">

            <img src="Stazzex-Logo.jpg"
                 alt="The Stazzex"
                 class="viewer-avatar">

            <strong>The Stazzex</strong>

        </div>

        <img id="viewerImage"
             class="viewer-image"
             src=""
             alt="">

    </div>

</div>

<script>

fetch("photos.txt")
.then(response => response.text())
.then(text => {

    const gallery = document.getElementById("gallery");

    const lines = text.split("\n");

    lines.forEach(line => {

        const match = line.match(/^\d+\.\s*(.+)$/);

        if(!match) return;

        const file = match[1].trim();

        if(file === "") return;

        const imagePath = "images/" + file;

        const img = document.createElement("img");

        img.src = imagePath;

        img.alt = file;

        img.onclick = function(){

            document.getElementById("viewer").style.display = "block";

            document.getElementById("viewerImage").src = imagePath;

        };

        gallery.appendChild(img);

    });

});
document.getElementById("close").onclick = function(){

    document.getElementById("viewer").style.display = "none";

};

document.getElementById("viewer").onclick = function(e){

    if(e.target === this){

        this.style.display = "none";

    }

};

</script>

</body>
</html>
