<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stazzerian President - Kelvin Stazzland</title>
    <style>
        :root {
            --neon-yellow: #facc15;
            --bg-dark: #1a1a1a;
            --text-gray: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        /* 9:16 Neon Frame Container */
        .phone-container {
            width: 360px;
            height: 640px;
            background-color: var(--bg-dark);
            border-radius: 30px;
            position: relative;
            box-shadow: 0 0 20px var(--neon-yellow), inset 0 0 10px var(--neon-yellow);
            border: 4px solid var(--neon-yellow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Periodic Flash Animation Trigger */
        @keyframes neon-flash {
            0%, 90%, 94%, 98%, 100% { opacity: 1; filter: drop-shadow(0 0 10px var(--neon-yellow)); }
            92%, 96% { opacity: 0.3; filter: none; }
        }

        .flash-active {
            animation: neon-flash 2s ease-in-out;
        }

        /* Horizontal Swipe Wrapper */
        .swiper-viewport {
            flex: 1;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
