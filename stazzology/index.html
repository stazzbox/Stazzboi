<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
STAZZOLOGY Teams
</title>

<meta
name="description"
content="Official STAZZOLOGY teams and channels."
>

<link
rel="canonical"
href="https://stazzboi.com/stazzology"
>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
}

.page{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

h1{
    text-align:center;
    font-size:52px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#b8b8b8;
    margin-bottom:60px;
    font-size:20px;
}

.main-logo{
    width:300px;
    display:block;
    margin:0 auto 70px;
}

.teams-section{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:70px;
    flex-wrap:wrap;
}

.team-link{
    transition:.3s;
}

.team-link:hover{
    transform:scale(1.08);
}

.team-icon{
    width:180px;
    height:auto;
}.frost-glow img{
    filter:drop-shadow(0 0 25px #00bfff);
}

.integrity-glow img{
    filter:drop-shadow(0 0 25px #ff3030);
}

.valor-glow img{
    filter:drop-shadow(0 0 25px #ffd700);
}

.kingdom-glow img{
    filter:drop-shadow(0 0 25px #9b30ff);
}

.frost-glow:hover img{
    filter:drop-shadow(0 0 40px #00bfff);
}

.integrity-glow:hover img{
    filter:drop-shadow(0 0 40px #ff3030);
}

.valor-glow:hover img{
    filter:drop-shadow(0 0 40px #ffd700);
}

.kingdom-glow:hover img{
    filter:drop-shadow(0 0 40px #9b30ff);
}

footer{
    text-align:center;
    color:#888;
    margin-top:100px;
    padding-top:30px;
    border-top:1px solid #333;
}

@media(max-width:900px){

    .teams-section{
        gap:40px;
    }

    .team-icon{
        width:140px;
    }

}

</style>

</head><body>

<div class="page">

    <h1>
        STAZZOLOGY
    </h1>

    <div class="subtitle">
        Official Teams
    </div>

    <img
        src="Stazzology-Logo.jpg"
        class="main-logo"
        alt="STAZZOLOGY"
    >

    <div class="teams-section">

        <a
            href="https://youtube.com/@STZFrost"
            class="team-link frost-glow"
            target="_blank"
        >

            <img
                src="STZFrost.png"
                class="team-icon"
                alt="STAZZOLOGY Frost"
            >

        </a>

        <a
            href="https://youtube.com/@STZIntegrity"
            class="team-link integrity-glow"
            target="_blank"
        >

            <img
                src="STZIntegrity.png"
                class="team-icon"
                alt="STAZZOLOGY Integrity"
            >

        </a>

        <a
            href="https://youtube.com/@STZValor"
            class="team-link valor-glow"
            target="_blank"
        >

            <img
                src="STZValor.png"
                class="team-icon"
                alt="STAZZOLOGY Valor"
            >

        </a>

        <a
            href="https://youtube.com/@STZKingdom"
            class="team-link kingdom-glow"
            target="_blank"
        >

            <img
                src="StzKingdom.png"
                class="team-icon"
                alt="STAZZOLOGY Kingdom"
            >

        </a>

    </div>

    <footer>

        <br><br>

        Powered by the Stazzex

    </footer>

</div>

</body>
</html>
